# Render Blueprint for the CineMind API (Phase 2 backend).
#
# IMPORTANT: this file must live at the GIT REPO ROOT (same level as this
# repo's top-level CLAUDE.md), not inside cinemind_phase1/ -- Render's
# Blueprint auto-discovery only reads render.yaml from the repo root that
# it clones. The actual project (backend/, frontend/, etc.) is nested one
# level down in cinemind_phase1/, which is why dockerfilePath/dockerContext
# below are prefixed with cinemind_phase1/ instead of being relative to it.
#
# Render's free tier is single-service with no persistent volumes and no
# sibling containers, so this deploys ONLY the FastAPI app -- not Qdrant,
# Postgres, Redis, or Neo4j. backend/recommender.py, graph.py, and
# feedback.py already degrade gracefully without them (numpy fallback,
# SQLite fallback, graph disabled -- see their module docstrings), so the
# app is fully functional here: recommendations, conversational search,
# onboarding, and "why this?" explanations all work. Only Redis caching and
# Neo4j graph insights are unavailable, and the UI already handles that
# (GET /health's graph_available/recs_cache fields; GraphInsights.jsx shows
# an error state instead of crashing).
#
# data/ and artifacts/ (~22MB) are baked into the image at build time by
# cinemind_phase1/backend/Dockerfile.render, since there's no volume to
# bind-mount them at runtime the way backend/docker-compose.yml does locally.
#
# Deploy: connect this repo in the Render dashboard as a Blueprint (New +
# -> Blueprint), or `render blueprint launch` with the Render CLI. Set the
# secret env vars below in the Render dashboard after the first deploy --
# they are intentionally left unset here (sync: false) rather than committed.
services:
  - type: web
    name: cinemind-api
    runtime: docker
    dockerfilePath: ./cinemind_phase1/backend/Dockerfile.render
    dockerContext: ./cinemind_phase1
    plan: free
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        value: https://cinemind-pink.vercel.app
      # Deliberately "0", unlike the local/Docker-compose setup: Render's
      # free tier has 512MB RAM total, and loading the E5 sentence-transformer
      # (~130MB + PyTorch overhead) on top of the two-tower model + content
      # vectors already in memory was OOM-killing the process on the first
      # Search/New-user request (Recommend never touches the embedder, which
      # is why only those two pages were affected). With this "0",
      # embedder.py's local_files_only=True load fails fast and
      # recommender.retrieve_candidates() falls back to _lexical_candidates()
      # (keyword+popularity matching) instead -- by design, see its
      # docstring. Search quality drops from semantic to keyword-based on
      # this deployment specifically; upgrade the Render plan for more RAM
      # if full semantic search is wanted live.
      - key: CINEMIND_ALLOW_MODEL_DOWNLOAD
        value: "0"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OMDB_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        value: https://cloud.langfuse.com
